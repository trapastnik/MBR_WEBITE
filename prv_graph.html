<script>
(function() {
  var inputs = document.querySelectorAll('#pin-gate .pin-inputs input');
  inputs.forEach(function(inp, i) {
    inp.addEventListener('input', function() {
      if (inp.value.length === 1 && i < inputs.length - 1) inputs[i + 1].focus();
    });
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
      if (e.key === 'Enter') document.getElementById('pin-submit').click();
    });
  });
  inputs[0].focus();
  async function sha256(str) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }
  document.getElementById('pin-submit').addEventListener('click', async function() {
    var pin = Array.from(inputs).map(function(i) { return i.value; }).join('');
    if (pin.length < 6) { document.getElementById('pin-error').textContent = 'Please enter all 6 digits'; return; }
    var h = await sha256(pin);
    if (h === 'c5b389beb081fe1e43ae92e895deca086b4eed5cf9efc7b78eebbbc9dc75c3f0') {
      document.body.classList.remove('locked');
      document.getElementById('pin-gate').classList.add('hidden');
      sessionStorage.setItem('dashboard_auth', '1');
      setTimeout(initGraph, 100);
    } else {
      document.getElementById('pin-error').textContent = 'Incorrect code';
      inputs.forEach(function(i) { i.value = ''; });
      inputs[0].focus();
    }
  });
  if (sessionStorage.getItem('dashboard_auth') === '1') {
    document.body.classList.remove('locked');
    document.getElementById('pin-gate').classList.add('hidden');
    setTimeout(initGraph, 100);
  }
})();
</script>

  { source: 'bluebird', target: 'zynteglo' }, { source: 'bluebird', target: 'skysona' },
  { source: 'vimkunya', target: 'chikungunya' }, { source: 'ixchiq', target: 'chikungunya' },
  { source: 'zevaskyn', target: 'eb' }, { source: 'miplyffa', target: 'npc' },
  { source: 'kebilidi', target: 'aadc' }, { source: 'daybue', target: 'rett' },
  { source: 'sohonos', target: 'fop' }, { source: 'elevidys', target: 'duchenne' },
  { source: 'zynteglo', target: 'thal' }, { source: 'skysona', target: 'cald' },
  { source: 'lapse', target: 'prv' }, { source: 'gkca', target: 'prv' },
  { source: 'reauth', target: 'prv' }, { source: 'reauth', target: 'gkca' },
  { source: 'doge', target: 'fda' }, { source: 'gao', target: 'reauth' },
  { source: 'gao', target: 'prv' }, { source: 'record2024', target: 'prv' },
  { source: 'record2024', target: 'lapse' }, { source: 'price350', target: 'abbvie' },
  { source: 'doge', target: 'cnpv' },
];

const typeColors = {
  program: 0x7c3aed, company: 0x60a5fa, drug: 0x34d399,
  disease: 0xf472b6, event: 0xfbbf24, buyer: 0x22d3ee,
};
const typeColorsCSS = {
  program: '#7c3aed', company: '#60a5fa', drug: '#34d399',
  disease: '#f472b6', event: '#fbbf24', buyer: '#22d3ee',
};

// ========================
// THREE.JS SETUP
// ========================
const container = document.getElementById('three-container');
let W = container.clientWidth || window.innerWidth;
let H = container.clientHeight || (window.innerHeight - 52);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a1b2e, 0.006);

const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 1000);
camera.position.set(0, 0, 80);

let renderer;
try {
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'default', failIfMajorPerformanceCaveat: false });
} catch(e) {
  container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#6b6f8a;font-size:16px;text-align:center;padding:40px;">WebGL is not supported in this browser.<br>Please try Chrome or Firefox.</div>';
  return;
}
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x1a1b2e);
container.appendChild(renderer.domElement);

// Ambient particles
const starGeo = new THREE.BufferGeometry();
const starCount = 400;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) starPos[i] = (Math.random() - 0.5) * 200;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0x4a4a6a, size: 0.15, transparent: true, opacity: 0.6 });
scene.add(new THREE.Points(starGeo, starMat));

// ========================
// NODE POSITIONS (3D force layout)
// ========================
const nodeMap = {};
nodesData.forEach((n, i) => {
  // Spread nodes in a sphere
  const phi = Math.acos(-1 + (2 * i) / nodesData.length);
  const theta = Math.sqrt(nodesData.length * Math.PI) * phi;
  const spread = 35;
  n.x = spread * Math.cos(theta) * Math.sin(phi) + (Math.random() - 0.5) * 8;
  n.y = spread * Math.sin(theta) * Math.sin(phi) + (Math.random() - 0.5) * 8;
  n.z = spread * Math.cos(phi) + (Math.random() - 0.5) * 8;
  n.vx = 0; n.vy = 0; n.vz = 0;
  nodeMap[n.id] = n;
});

// Resolve edges
edgesData.forEach(e => {
  e.srcNode = nodeMap[e.source];
  e.tgtNode = nodeMap[e.target];
});

// ========================
// CREATE 3D OBJECTS
// ========================
const nodeMeshes = [];
const glowMeshes = [];
const nodeGroup = new THREE.Group();
scene.add(nodeGroup);

nodesData.forEach(n => {
  // Sphere
  const geo = new THREE.SphereGeometry(n.r, 24, 24);
  const mat = new THREE.MeshPhongMaterial({
    color: typeColors[n.type],
    emissive: typeColors[n.type],
    emissiveIntensity: 0.4,
    shininess: 80,
    transparent: true,
    opacity: 0.9,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(n.x, n.y, n.z);
  mesh.userData = n;
  nodeGroup.add(mesh);
  nodeMeshes.push(mesh);
  n.mesh = mesh;

  // Glow sphere (larger, transparent)
  const glowGeo = new THREE.SphereGeometry(n.r * 2.2, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: typeColors[n.type],
    transparent: true,
    opacity: 0.08,
    depthWrite: false,
    side: THREE.BackSide,
  });
  const glowMesh = new THREE.Mesh(glowGeo, glowMat);
  glowMesh.position.copy(mesh.position);
  nodeGroup.add(glowMesh);
  glowMeshes.push(glowMesh);
  n.glow = glowMesh;
});

// Edge lines
const edgeGroup = new THREE.Group();
scene.add(edgeGroup);
const edgeLines = [];

edgesData.forEach(e => {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(6);
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.LineBasicMaterial({
    color: 0xa78bfa,
    transparent: true,
    opacity: 0.12,
    depthWrite: false,
  });
  const line = new THREE.Line(geo, mat);
  edgeGroup.add(line);
  edgeLines.push({ line, edge: e });
});

// Labels (HTML overlay via CSS2D-like approach using divs)
const labelContainer = document.createElement('div');
labelContainer.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;';
container.appendChild(labelContainer);

const labels = [];
nodesData.forEach(n => {
  const div = document.createElement('div');
  div.textContent = n.label;
  div.style.cssText = `position:absolute;color:#e4e6eb;font-size:${n.r >= 2 ? 11 : 10}px;font-weight:${n.r >= 2 ? 600 : 500};font-family:Inter,sans-serif;white-space:nowrap;text-shadow:0 0 8px rgba(0,0,0,.9),0 0 3px rgba(0,0,0,.7);pointer-events:none;transform:translate(-50%,4px);transition:opacity .2s;`;
  labelContainer.appendChild(div);
  labels.push({ div, node: n });
});

// Lights
scene.add(new THREE.AmbientLight(0x334155, 0.6));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, 50, 50);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x7c3aed, 1, 150);
pointLight.position.set(0, 0, 40);
scene.add(pointLight);

// ========================
// 3D FORCE SIMULATION
// ========================
function simulate3D() {
  const repulsion = 300;
  const springLen = 16;
  const springK = 0.008;
  const centerK = 0.003;
  const damping = 0.88;

  nodesData.forEach(n => {
    n.vx += -n.x * centerK;
    n.vy += -n.y * centerK;
    n.vz += -n.z * centerK;
  });

  for (let i = 0; i < nodesData.length; i++) {
    for (let j = i + 1; j < nodesData.length; j++) {
      const a = nodesData[i], b = nodesData[j];
      let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
      let dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
      let force = repulsion / (dist * dist);
      let fx = (dx/dist)*force, fy = (dy/dist)*force, fz = (dz/dist)*force;
      a.vx -= fx; a.vy -= fy; a.vz -= fz;
      b.vx += fx; b.vy += fy; b.vz += fz;
    }
  }

  edgesData.forEach(e => {
    const a = e.srcNode, b = e.tgtNode;
    let dx = b.x - a.x, dy = b.y - a.y, dz = b.z - a.z;
    let dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
    let force = (dist - springLen) * springK;
    let fx = (dx/dist)*force, fy = (dy/dist)*force, fz = (dz/dist)*force;
    a.vx += fx; a.vy += fy; a.vz += fz;
    b.vx -= fx; b.vy -= fy; b.vz -= fz;
  });

  nodesData.forEach(n => {
    n.vx *= damping; n.vy *= damping; n.vz *= damping;
    n.x += n.vx; n.y += n.vy; n.z += n.vz;
    n.mesh.position.set(n.x, n.y, n.z);
    n.glow.position.set(n.x, n.y, n.z);
  });
}

// ========================
// ORBIT CONTROLS (manual)
// ========================
let spherical = { theta: 0, phi: Math.PI / 2, radius: 80 };
let targetSpherical = { theta: 0, phi: Math.PI / 2, radius: 80 };
let isDragging = false;
let lastMouse = { x: 0, y: 0 };
let autoRotate = true;

function updateCamera() {
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.08;
  spherical.phi += (targetSpherical.phi - spherical.phi) * 0.08;
  spherical.radius += (targetSpherical.radius - spherical.radius) * 0.08;

  const r = spherical.radius;
  const t = spherical.theta;
  const p = spherical.phi;
  camera.position.set(
    r * Math.sin(p) * Math.cos(t),
    r * Math.cos(p),
    r * Math.sin(p) * Math.sin(t)
  );
  camera.lookAt(0, 0, 0);
}

const el = renderer.domElement;

let mouseDownPos = { x: 0, y: 0 };

el.addEventListener('mousedown', e => {
  isDragging = true;
  autoRotate = false;
  lastMouse = { x: e.clientX, y: e.clientY };
  mouseDownPos = { x: e.clientX, y: e.clientY };
  el.style.cursor = 'grabbing';
});

el.addEventListener('mousemove', e => {
  if (isDragging) {
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    targetSpherical.theta -= dx * 0.005;
    targetSpherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, targetSpherical.phi - dy * 0.005));
    lastMouse = { x: e.clientX, y: e.clientY };
  } else {
    handleHover(e);
  }
});

el.addEventListener('mouseup', e => {
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  const wasDrag = Math.sqrt(dx*dx + dy*dy) > 5;
  isDragging = false;
  el.style.cursor = 'grab';
  // Click (not drag) — open URL
  if (!wasDrag && hoveredNode && hoveredNode.url) {
    window.open(hoveredNode.url, '_blank');
  }
});
el.addEventListener('mouseleave', () => {
  isDragging = false;
  hoveredNode = null;
  document.getElementById('tooltip').classList.remove('visible');
});
el.style.cursor = 'grab';

el.addEventListener('wheel', e => {
  e.preventDefault();
  targetSpherical.radius = Math.max(20, Math.min(200, targetSpherical.radius + e.deltaY * 0.05));
}, { passive: false });

// Touch support
let lastTouchDist = 0;
let lastTouch = { x: 0, y: 0 };

el.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    autoRotate = false;
    lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
  e.preventDefault();
}, { passive: false });

el.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - lastTouch.x;
    const dy = e.touches[0].clientY - lastTouch.y;
    targetSpherical.theta -= dx * 0.005;
    targetSpherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, targetSpherical.phi - dy * 0.005));
    lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastTouchDist) {
      targetSpherical.radius = Math.max(20, Math.min(200, targetSpherical.radius * (lastTouchDist / dist)));
    }
    lastTouchDist = dist;
  }
  e.preventDefault();
}, { passive: false });

el.addEventListener('touchend', () => { isDragging = false; lastTouchDist = 0; });

// ========================
// HOVER / RAYCASTING
// ========================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredNode = null;

function handleHover(e) {
  const rect = container.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(nodeMeshes);

  const tooltip = document.getElementById('tooltip');
  if (hits.length > 0) {
    const n = hits[0].object.userData;
    if (!isVisible(n)) { hoveredNode = null; tooltip.classList.remove('visible'); return; }
    hoveredNode = n;
    tooltip.querySelector('.tt-type').textContent = n.type;
    tooltip.querySelector('.tt-type').style.color = typeColorsCSS[n.type];
    tooltip.querySelector('.tt-title').textContent = n.label;
    tooltip.querySelector('.tt-desc').textContent = n.desc;
    tooltip.querySelector('.tt-link').textContent = n.url ? 'Click to open source →' : '';
    tooltip.classList.add('visible');
    let tx = e.clientX + 16, ty = e.clientY + 16;
    if (tx + 320 > window.innerWidth) tx = e.clientX - 336;
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
    el.style.cursor = 'pointer';
  } else {
    hoveredNode = null;
    tooltip.classList.remove('visible');
    if (!isDragging) el.style.cursor = 'grab';
  }
}

// ========================
// FILTER
// ========================
let activeFilters = new Set(['all']);

function isVisible(node) {
  if (activeFilters.has('all')) return true;
  return activeFilters.has(node.type);
}

document.querySelectorAll('.filter-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const f = pill.dataset.filter;
    if (f === 'all') {
      // Reset to all
      activeFilters.clear();
      activeFilters.add('all');
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    } else {
      // Toggle this filter; remove 'all' if present
      activeFilters.delete('all');
      document.querySelector('.filter-pill[data-filter="all"]').classList.remove('active');
      if (activeFilters.has(f)) {
        activeFilters.delete(f);
        pill.classList.remove('active');
        // If nothing selected, go back to 'all'
        if (activeFilters.size === 0) {
          activeFilters.add('all');
          document.querySelector('.filter-pill[data-filter="all"]').classList.add('active');
        }
      } else {
        activeFilters.add(f);
        pill.classList.add('active');
      }
    }
    updateVisibility();
  });
});

function updateVisibility() {
  // Build connected set for current filter
  const visibleIds = new Set();
  nodesData.forEach(n => { if (isVisible(n)) visibleIds.add(n.id); });

  nodeMeshes.forEach((mesh, i) => {
    const n = nodesData[i];
    const vis = visibleIds.has(n.id);
    mesh.visible = vis;
    glowMeshes[i].visible = vis;
    labels[i].div.style.display = vis ? '' : 'none';
  });

  edgeLines.forEach(el => {
    const e = el.edge;
    el.line.visible = visibleIds.has(e.source) && visibleIds.has(e.target);
  });
}

// Reset button
document.getElementById('btn-reset').addEventListener('click', () => {
  targetSpherical = { theta: 0, phi: Math.PI / 2, radius: 80 };
  autoRotate = true;
});

// ========================
// ANIMATION LOOP
// ========================
let time = 0;
let settled = false;

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  // Run physics for first ~8 seconds to settle
  if (time < 8) {
    simulate3D();
    // Update edge positions
    edgeLines.forEach(el => {
      const e = el.edge;
      const pos = el.line.geometry.attributes.position.array;
      pos[0] = e.srcNode.x; pos[1] = e.srcNode.y; pos[2] = e.srcNode.z;
      pos[3] = e.tgtNode.x; pos[4] = e.tgtNode.y; pos[5] = e.tgtNode.z;
      el.line.geometry.attributes.position.needsUpdate = true;
    });
  } else if (!settled) {
    settled = true;
    // Final edge update
    edgeLines.forEach(el => {
      const e = el.edge;
      const pos = el.line.geometry.attributes.position.array;
      pos[0] = e.srcNode.x; pos[1] = e.srcNode.y; pos[2] = e.srcNode.z;
      pos[3] = e.tgtNode.x; pos[4] = e.tgtNode.y; pos[5] = e.tgtNode.z;
      el.line.geometry.attributes.position.needsUpdate = true;
    });
  }

  // Auto rotate
  if (autoRotate) {
    targetSpherical.theta += 0.002;
  }

  // Glow pulse
  glowMeshes.forEach((g, i) => {
    g.material.opacity = 0.06 + 0.05 * Math.sin(time * 2 + i * 0.5);
    g.position.copy(nodesData[i].mesh.position);
  });

  // Hover highlighting
  if (hoveredNode) {
    const connIds = new Set([hoveredNode.id]);
    edgesData.forEach(e => {
      if (e.source === hoveredNode.id || e.target === hoveredNode.id) {
        connIds.add(e.source); connIds.add(e.target);
      }
    });
    nodeMeshes.forEach((mesh, i) => {
      const n = nodesData[i];
      if (!isVisible(n)) return;
      const conn = connIds.has(n.id);
      mesh.material.opacity = conn ? 1 : 0.15;
      mesh.material.emissiveIntensity = conn ? 0.7 : 0.1;
      labels[i].div.style.opacity = conn ? '1' : '0.15';
    });
    edgeLines.forEach(el => {
      const e = el.edge;
      const conn = connIds.has(e.source) && connIds.has(e.target);
      el.line.material.opacity = conn ? 0.6 : 0.03;
    });
  } else {
    nodeMeshes.forEach((mesh, i) => {
      if (!isVisible(nodesData[i])) return;
      mesh.material.opacity = 0.9;
      mesh.material.emissiveIntensity = 0.4;
      labels[i].div.style.opacity = '1';
    });
    edgeLines.forEach(el => { el.line.material.opacity = 0.12; });
  }

  updateCamera();

  // Update label positions (project 3D → 2D)
  labels.forEach(l => {
    const n = l.node;
    if (!isVisible(n)) return;
    const v = new THREE.Vector3(n.x, n.y - n.r - 0.5, n.z);
    v.project(camera);
    const x = (v.x * 0.5 + 0.5) * W;
    const y = (-v.y * 0.5 + 0.5) * H;
    l.div.style.left = x + 'px';
    l.div.style.top = y + 'px';
    // Hide labels behind camera
    l.div.style.display = (v.z > 1 || !isVisible(n)) ? 'none' : '';
    // Scale opacity by distance
    const dist = camera.position.distanceTo(new THREE.Vector3(n.x, n.y, n.z));
    l.div.style.opacity = Math.max(0, Math.min(1, 1 - (dist - 30) / 120));
  });

  renderer.render(scene, camera);
}

animate();

// Hide hint after 5 seconds
setTimeout(() => {
  const hint = document.getElementById('hint');
  if (hint) hint.style.opacity = '0';
}, 5000);

// Resize
window.addEventListener('resize', () => {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

} catch(err) {
  console.error('Graph init error:', err);
  document.getElementById('three-container').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#6b6f8a;font-size:14px;text-align:center;padding:40px;">Error loading 3D graph.<br>Please try a different browser.</div>';
}
} // end initGraph
</script>
